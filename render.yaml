services:
  - type: web
    name: builder-sales-bot-api
    runtime: node
    plan: free
    rootDir: .
    region: frankfurt
    buildCommand: npm install && npm run prisma:generate && npm run build --workspace @builderbot/config && npm run build --workspace @builderbot/domain && npm run build --workspace @builderbot/api
    startCommand: npx prisma db push --schema infra/prisma/schema.prisma && npm run prisma:seed && node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: QUEUE_MODE
        value: inline
      - key: AI_PROVIDER
        sync: false
      - key: TELEGRAM_TRANSPORT
        value: polling
      - key: OPENAI_MODEL
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_EMBEDDING_MODEL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: XAI_MODEL
        sync: false
      - key: XAI_BASE_URL
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGER_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_PUBLIC_URL
        value: https://builder-sales-bot-admin.onrender.com
      - key: APP_PUBLIC_URL
        value: https://builder-sales-bot-api.onrender.com

  - type: web
    name: builder-sales-bot-admin
    runtime: node
    plan: free
    rootDir: .
    region: frankfurt
    buildCommand: npm install && npm run build --workspace @builderbot/ui && npm run build --workspace @builderbot/admin
    startCommand: npm run start --workspace @builderbot/admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_API_URL
        value: https://builder-sales-bot-api.onrender.com

databases:
  - name: builder-sales-bot-db
    databaseName: builder_sales_bot
    plan: free
    region: frankfurt
